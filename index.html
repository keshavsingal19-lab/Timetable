  <body>
    <div id="root">
      <div id="splash-screen" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000066;transition:opacity 0.5s ease">
        <img src="/icon-192.png" alt="" width="64" height="64" style="border-radius:16px;animation:splashPulse 2s ease-in-out infinite" />
        <div style="margin-top:24px;width:28px;height:28px;border:3px solid rgba(255,255,255,0.12);border-top-color:#FCEB08;border-radius:50%;animation:splashSpin 0.8s linear infinite"></div>
      </div>
    </div>
  <style>
    @keyframes splashPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.05);opacity:0.85} }
    @keyframes splashSpin { to{transform:rotate(360deg)} }
  </style>
  <script>
    // Only show splash on cold PWA launch, not on tab reload
    (function(){
      if(sessionStorage.getItem('_loaded')){
        var s=document.getElementById('splash-screen'); if(s) s.remove(); return;
      }
      sessionStorage.setItem('_loaded','1');
      var rm=function(){ var s=document.getElementById('splash-screen'); if(s){s.style.opacity='0';setTimeout(function(){s.remove()},500);} };
      var obs=new MutationObserver(function(){ if(document.getElementById('root').children.length>1){rm();obs.disconnect();} });
      obs.observe(document.getElementById('root'),{childList:true});
      setTimeout(rm,6000);
    })();
  </script>
  <script type="module" src="/index.tsx"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
